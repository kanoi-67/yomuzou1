<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>よむ　ぞう　くん</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap');

        body {
            font-family: 'Kiwi Maru', serif;
            background-color: #f0fdf4;
            overflow: hidden; 
            touch-action: manipulation;
        }

        .card-container {
            perspective: 1000px;
            width: 31%;
        }

        .card-inner {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 3px solid white;
        }

        .card-front { background-color: #ffffff; }
        .card-back { background-color: #ffffff; transform: rotateY(180deg); }

        .pattern-1 { background-image: radial-gradient(#fbbf24 2px, transparent 2px); background-size: 15px 15px; }
        .pattern-2 { background-image: repeating-linear-gradient(45deg, #60a5fa 0, #60a5fa 5px, #93c5fd 5px, #93c5fd 10px); }
        .pattern-3 { background-image: radial-gradient(#f87171 10%, transparent 10%); background-size: 20px 20px; }

        .celebration-element {
            position: absolute;
            pointer-events: none;
            animation: fall 4s linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: explode 0.8s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(25); opacity: 0; }
        }

        .dot {
            width: 16px;
            height: 16px;
            background-color: #3b82f6;
            border-radius: 50%;
            border: 2px solid #1d4ed8;
            flex-shrink: 0; /* 縮小させない */
        }

        /* 横1行に並べるための設定 */
        #display-dots {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap; /* 改行させない */
            justify-content: center;
            align-items: center;
            gap: 4px;
            width: 100%;
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">

    <!-- タイトル画面 -->
    <div id="start-screen" class="text-center w-full max-w-lg px-4">
        <h1 class="text-5xl font-bold text-blue-600 mb-6">よむ　ぞう　くん</h1>
        <div class="mb-8 flex justify-center">
            <!-- さらに改良：より「象」とわかりやすいかわいいイラスト -->
            <svg width="220" height="180" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
                <!-- 大きな耳 -->
                <ellipse cx="60" cy="70" rx="35" ry="45" fill="#A5D8FF" stroke="#74C0FC" stroke-width="2" />
                <ellipse cx="140" cy="70" rx="35" ry="45" fill="#A5D8FF" stroke="#74C0FC" stroke-width="2" />
                <ellipse cx="65" cy="70" rx="20" ry="30" fill="#D0EBFF" />
                <ellipse cx="135" cy="70" rx="20" ry="30" fill="#D0EBFF" />
                <!-- 体と顔 -->
                <path d="M50,130 Q50,40 100,40 Q150,40 150,130 L50,130" fill="#A5D8FF" />
                <!-- 鼻 (象の最大の特徴) -->
                <path d="M100,90 Q100,150 130,145" fill="none" stroke="#A5D8FF" stroke-width="20" stroke-linecap="round" />
                <path d="M103,95 Q103,145 125,142" fill="none" stroke="#74C0FC" stroke-width="1.5" stroke-dasharray="4,4" />
                <!-- 目 -->
                <circle cx="80" cy="85" r="5" fill="#333" />
                <circle cx="120" cy="85" r="5" fill="#333" />
                <circle cx="82" cy="83" r="2" fill="white" />
                <circle cx="122" cy="83" r="2" fill="white" />
                <!-- ほっぺ -->
                <circle cx="70" cy="100" r="6" fill="#FFD1DC" opacity="0.8" />
                <circle cx="130" cy="100" r="6" fill="#FFD1DC" opacity="0.8" />
                <!-- 足の爪っぽさ -->
                <circle cx="75" cy="130" r="4" fill="#E7F5FF" />
                <circle cx="100" cy="130" r="4" fill="#E7F5FF" />
                <circle cx="125" cy="130" r="4" fill="#E7F5FF" />
            </svg>
        </div>
        <button onclick="startGame()" class="bg-orange-400 hover:bg-orange-500 text-white text-3xl font-bold py-5 px-16 rounded-full shadow-lg transform transition active:scale-95">
            はじめる
        </button>
    </div>

    <!-- メイン学習画面 -->
    <div id="game-screen" class="hidden w-full h-full flex flex-col items-center justify-between py-4 px-2">
        <div class="w-full max-w-3xl flex justify-between items-center px-4 pt-2">
            <span id="question-count" class="text-lg font-bold text-gray-600">だい 1 / 10 もん</span>
            <div class="bg-white px-3 py-1 rounded-full border-2 border-blue-100">
                <span class="text-blue-500 font-bold text-sm">よむ ぞう くん</span>
            </div>
        </div>

        <div class="w-full max-w-4xl flex justify-center gap-2 md:gap-4 flex-grow items-center">
            <div class="card-container">
                <div id="card-img" class="card-inner" onclick="this.classList.toggle('is-flipped')">
                    <div class="card-face card-front pattern-1">
                        <span class="text-3xl md:text-5xl">🖼️</span>
                    </div>
                    <div class="card-face card-back">
                        <div id="display-emoji" class="text-5xl md:text-8xl">🍎</div>
                    </div>
                </div>
                <p class="mt-2 text-sm font-bold text-gray-500">え</p>
            </div>

            <div class="card-container">
                <div id="card-dots" class="card-inner" onclick="this.classList.toggle('is-flipped')">
                    <div class="card-face card-front pattern-2">
                        <span class="text-3xl md:text-5xl text-blue-600">●</span>
                    </div>
                    <div class="card-face card-back">
                        <div id="display-dots">
                            <!-- JSで生成（1行に並ぶようにスタイル調整済み） -->
                        </div>
                    </div>
                </div>
                <p class="mt-2 text-sm font-bold text-gray-500">おと</p>
            </div>

            <div class="card-container">
                <div id="card-text" class="card-inner" onclick="this.classList.toggle('is-flipped')">
                    <div class="card-face card-front pattern-3">
                        <span class="text-3xl md:text-5xl text-red-500">あ</span>
                    </div>
                    <div class="card-face card-back">
                        <div id="display-word" class="text-2xl md:text-5xl font-bold text-blue-600 tracking-tighter">りんご</div>
                    </div>
                </div>
                <p class="mt-2 text-sm font-bold text-gray-500">もじ</p>
            </div>
        </div>

        <div class="w-full max-w-md flex justify-center gap-4 pb-6">
            <button onclick="showCelebration()" class="bg-red-500 hover:bg-red-600 text-white text-2xl font-bold py-4 px-10 rounded-2xl shadow-md active:scale-95 transition-transform">
                せいかい！
            </button>
            <button onclick="nextQuestion()" class="bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-4 px-10 rounded-2xl shadow-md active:scale-95 transition-transform">
                つぎへ
            </button>
        </div>
    </div>

    <!-- お祝い画面 -->
    <div id="celebration-screen" class="hidden fixed inset-0 z-50 bg-white/95 flex flex-col items-center justify-center text-center overflow-hidden">
        <div id="celebration-container" class="absolute inset-0"></div>
        <div class="z-10 bg-white p-10 md:p-14 rounded-3xl shadow-2xl border-4 border-yellow-400 max-w-sm mx-4">
            <div id="celebration-emoji" class="text-8xl mb-4">🌸</div>
            <h2 id="celebration-message" class="text-4xl font-bold text-orange-600 mb-8">よくできました！</h2>
            <button onclick="backToGame()" class="bg-gray-700 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-lg">
                もどる
            </button>
        </div>
    </div>

    <!-- 終了画面 -->
    <div id="end-screen" class="hidden text-center p-4">
        <h2 class="text-6xl font-bold text-blue-600 mb-8">おわり！</h2>
        <p class="text-2xl mb-10">ぜんぶで 10もん できました！</p>
        <div class="flex flex-col gap-6 items-center">
            <button onclick="startGame()" class="bg-green-500 hover:bg-green-600 text-white text-3xl font-bold py-6 px-16 rounded-full shadow-lg w-64">
                つづける
            </button>
            <button onclick="location.reload()" class="bg-gray-400 hover:bg-gray-500 text-white text-xl font-bold py-4 px-16 rounded-full shadow-lg w-64">
                やめる
            </button>
        </div>
    </div>

    <script>
        const questionMaster = [
            { word: 'りんご', emoji: '🍎' }, { word: 'みかん', emoji: '🍊' }, { word: 'すいか', emoji: '🍉' },
            { word: 'ぞう', emoji: '🐘' }, { word: 'きりん', emoji: '🦒' }, { word: 'いぬ', emoji: '🐶' },
            { word: 'ねこ', emoji: '🐱' }, { word: 'うさぎ', emoji: '🐰' }, { word: 'くるま', emoji: '🚗' },
            { word: 'とり', emoji: '🐦' }, { word: 'さかな', emoji: '🐟' }, { word: 'とまと', emoji: '🍅' },
            { word: 'なすび', emoji: '🍆' }, { word: 'かえる', emoji: '🐸' }, { word: 'くつ', emoji: '👟' },
            { word: 'かさ', emoji: '☂️' }, { word: 'とけい', emoji: '⌚' }, { word: 'はな', emoji: '🌷' },
            { word: 'えんぴつ', emoji: '✏️' }, { word: 'いす', emoji: '🪑' }, { word: 'あり', emoji: '🐜' },
            { word: 'ぶた', emoji: '🐷' }, { word: 'かめ', emoji: '🐢' }, { word: 'ばなな', emoji: '🍌' },
            { word: 'たまご', emoji: '🥚' }, { word: 'くま', emoji: '🐻' }, { word: 'めがね', emoji: '👓' },
            { word: 'ふね', emoji: '🚢' }, { word: 'らいおん', emoji: '🦁' }, { word: 'ぼうし', emoji: '🧢' }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let celebrationTimer = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSuccessSound(type) {
            const now = audioCtx.currentTime;
            
            if (type === 'firework') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(f, now + i*0.05);
                    gain.gain.setValueAtTime(0.05, now + i*0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.05 + 0.4);
                    osc.start(now + i*0.05); osc.stop(now + i*0.05 + 0.4);
                });
            } else if (type === 'flower') {
                [523, 659, 783, 1046, 1318].forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now + i * 0.1);
                    gain.gain.setValueAtTime(0.1, now + i * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.5);
                    osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.5);
                });
            } else {
                [392, 523, 659].forEach(f => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(f, now);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                    osc.start(now); osc.stop(now + 0.6);
                });
            }
        }

        function startGame() {
            currentQuestions = [...questionMaster].sort(() => Math.random() - 0.5).slice(0, 10);
            currentIndex = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('question-count').innerText = `だい ${currentIndex + 1} / 10 もん`;
            document.querySelectorAll('.card-inner').forEach(card => card.classList.remove('is-flipped'));
            document.getElementById('display-emoji').innerText = q.emoji;
            document.getElementById('display-word').innerText = q.word;
            
            const dotContainer = document.getElementById('display-dots');
            dotContainer.innerHTML = '';
            for(let i = 0; i < q.word.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dotContainer.appendChild(dot);
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < 10) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showCelebration() {
            const types = ['clap', 'firework', 'flower'];
            const type = types[Math.floor(Math.random() * types.length)];
            const messages = ["すごーい！", "そのちょうし！", "てんさいだね！", "やったね！", "はなまる！"];
            
            const screen = document.getElementById('celebration-screen');
            const container = document.getElementById('celebration-container');
            const msgEl = document.getElementById('celebration-message');
            const emojiEl = document.getElementById('celebration-emoji');
            
            container.innerHTML = '';
            msgEl.innerText = messages[Math.floor(Math.random() * messages.length)];
            screen.classList.remove('hidden');

            playSuccessSound(type);

            if (type === 'flower') {
                emojiEl.innerText = '🌸';
                for (let i = 0; i < 40; i++) createParticle('🌸', container);
            } else if (type === 'firework') {
                emojiEl.innerText = '🎆';
                for (let i = 0; i < 8; i++) setTimeout(() => createFirework(container), i * 300);
            } else {
                emojiEl.innerText = '👏';
                for (let i = 0; i < 30; i++) createParticle('✨', container);
            }

            clearTimeout(celebrationTimer);
            celebrationTimer = setTimeout(() => backToGame(), 5000);
        }

        function createParticle(emoji, container) {
            const el = document.createElement('div');
            el.className = 'celebration-element';
            el.innerText = emoji;
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 2 + 2) + 's';
            el.style.fontSize = (Math.random() * 20 + 20) + 'px';
            container.appendChild(el);
        }

        function createFirework(container) {
            const x = Math.random() * 80 + 10;
            const y = Math.random() * 60 + 10;
            const colors = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const fw = document.createElement('div');
            fw.className = 'firework';
            fw.style.left = x + '%';
            fw.style.top = y + '%';
            fw.style.backgroundColor = color;
            fw.style.boxShadow = `0 0 15px ${color}`;
            container.appendChild(fw);
            setTimeout(() => fw.remove(), 800);
        }

        function backToGame() {
            clearTimeout(celebrationTimer);
            document.getElementById('celebration-screen').classList.add('hidden');
        }

        function showEndScreen() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
